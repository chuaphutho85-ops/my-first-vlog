<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>
        My First Vlog
    </title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="style.css"
    />

    <!-- Remix Icon -->
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
        rel="stylesheet"
    />
</head>

<!-- Background Music -->
<audio
    id="bg-music"
    loop
>
    <source
        src="music.mp3"
        type="audio/mpeg"
    />
</audio>

<body>

    <!-- =========================
         NAVBAR
    ========================== -->
    <header class="navbar">

        <!-- Logo -->
        <div class="logo">

            <div class="logo-icon">
                <i class="ri-video-line"></i>
            </div>

            <span>
                My First Vlog
            </span>

        </div>


        <!-- Menu -->
        <nav class="menu">

            <a href="#">
                Home
            </a>

            <a href="#">
                Vlogs
            </a>

            <a href="#">
                Gallery
            </a>

            <a href="#">
                About
            </a>

        </nav>

    </header>


    <!-- =========================
         HERO SECTION
    ========================== -->
    <section class="hero">

        <!-- Left -->
        <div class="hero-content">

            <div class="hero-badge">

                <i class="ri-sparkling-2-line"></i>

                <span>
                    Daily Life • Travel • Study
                </span>

            </div>

            <h1>
                Capture Your <br />
                Beautiful Moments
            </h1>

            <p>
                Một không gian nhỏ để lưu giữ
                những khoảnh khắc đời thường,
                học tập, du lịch và hành trình
                phát triển bản thân mỗi ngày.
            </p>

            <button id="watch-btn">

                <i class="ri-play-circle-line"></i>

                Watch Vlog

            </button>

        </div>


        <!-- Right -->
        <div class="hero-image">

            <img
                src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=1200&auto=format&fit=crop"
                alt="Vlog Image"
            />

        </div>

    </section>


    <!-- =========================
         FOOTER
    ========================== -->
    <footer class="footer">

        <p>
            © 2026 My First Vlog —
            Minimal Lifestyle Website
        </p>

    </footer>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
